name: Zeroshot MIDI Test

on: [push, workflow_dispatch]

jobs:
  zeroshot-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install music21
          npm install
      - name: Run zeroshot tests
        run: |
          bash tests/test-midi-text2midi.sh 2>&1 || true
          node prototypes/midi-text-to-sequence.js "Auto CI test: C major arpeggio" 2>&1
      - name: Verify MIDI output
        run: |
          python3 -c "
import music21, glob, os
files = glob.glob('prototypes/generated/*.mid')
print(f'MIDI files generated: {len(files)}')
for f in files:
    m = music21.converter.parse(f)
    print(f'  {os.path.basename(f)}: {len(m.parts)} tracks, key={m.analyze(\"key\")}')
"
