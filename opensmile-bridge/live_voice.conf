;;;;
;; Minimal Live Voice Feature Config — OpenSMILE
;; For SuperInstance Live Paradigm real-time voice feature extraction.
;;
;; Produces the 25 eGeMAPS-compatible LLD features streaming-friendly:
;;   F0, Loudness, Jitter, Shimmer, HNR, F1-F3 freq+bw,
;;   MFCC 1-4, Spectral Flux, Alpha Ratio, Slopes 0-500/500-1500
;;
;; No file I/O, no functional summarizers, no video.
;; Input: raw PCM frames pushed via cDataWriter (not file reader)
;; Output: frame-level features at ~100Hz
;;;;

[componentInstances:cComponentManager]
instance[dataMemory].type=cDataMemory
printLevelStats = 0

;; --- Input frame spec (data pushed programmatically, not from file) ---
;; Expects frames of size = frameSize at sampleRate
;; The data writer will push float32 PCM samples at this rate

[componentInstances:cComponentManager]
instance[frame].type=cFramer
instance[win].type=cWindower
instance[fft].type=cTransformFFT
instance[fftmag].type=cFftmagphase
instance[acf].type=cAcf

; Pitch + HNR
instance[pitch].type=cPitchACF

; Jitter + Shimmer
instance[jitter].type=cJitter
instance[shimmer].type=cShimmer

; Formants via LPC
instance[lpc].type=cLpc
instance[formants].type=cFormantLpc

; Energy (RMS)
instance[energy].type=cEnergy

; Spectral features (flux, alpha ratio, slopes, hammarberg)
instance[spectral].type=cSpectral

; Mel spectrogram + MFCC
instance[melspec].type=cMelspec
instance[mfcc].type=cMfcc

; Smoother (3-frame SMA, like eGeMAPS)
instance[smootherF0].type=cContourSmoother
instance[smootherNonF0].type=cContourSmoother

; Collector — concatenates all features into single frame vector
instance[concat].type=cVectorConcat

; Output writer — writes feature frames to data memory
instance[writer].type=cCsvSink


;; ============ Processing chain ============

;;;;; Framer — chop audio into overlapping frames
[frame:cFramer]
reader.dmLevel = wave            ; expects PCM input at this level
writer.dmLevel = frame
copyInputName = 0
frameSize = 0.060                ; 60ms frame (eGeMAPS standard)
frameStep = 0.010                ; 10ms step (100Hz output rate)
frameMode = fixed               ; fixed frame rate


;;;;; Windower — apply Hamming window
[win:cWindower]
reader.dmLevel = frame
writer.dmLevel = win
winFunc = hamming


;;;;; FFT
[fft:cTransformFFT]
reader.dmLevel = win
writer.dmLevel = fft
fftMode = absmag


;;;;; FFT magnitude spectrum
[fftmag:cFftmagphase]
reader.dmLevel = fft
writer.dmLevel = fftmag
copyInputName = 0
; only magnitude needed for eGeMAPS features
magnitude = 1
phase = 0


;;;;; ACF — for pitch detection
[acf:cAcf]
reader.dmLevel = win
writer.dmLevel = acf
copyInputName = 0


;;;;; Pitch (F0) + HNR via ACF + Cepstrum
[pitch:cPitchACF]
reader.dmLevel = acf
writer.dmLevel = pitch
copyInputName = 0
maxPitch = 500.0
minPitch = 60.0
HNR = 0            ; linear HNR (legacy)
HNRdB = 1          ; dB HNR (recommended)
voiceProb = 1      ; voicing probability
F0 = 1             ; F0 output
voicingCutoff = 0.55


;;;;; Jitter — vocal frequency perturbation
[jitter:cJitter]
reader.dmLevel = pitch
writer.dmLevel = jitter
copyInputName = 1


;;;;; Shimmer — vocal amplitude perturbation
[shimmer:cShimmer]
reader.dmLevel = pitch
writer.dmLevel = shimmer
copyInputName = 1


;;;;; LPC — Linear Predictive Coding for formants
[lpc:cLpc]
reader.dmLevel = win
writer.dmLevel = lpc
copyInputName = 0
p = 8              ; LPC order (8 for 16kHz)
lpcMethod = autocorrelation
useGain = 0


;;;;; Formants — F1, F2, F3 from LPC coefficients
[formants:cFormantLpc]
reader.dmLevel = lpc
writer.dmLevel = formants
copyInputName = 0
numFormants = 3    ; F1, F2, F3
minFreq = 200      ; minimum formant frequency (Hz)
maxFreq = 5000     ; maximum formant frequency (Hz)


;;;;; Energy — RMS loudness
[energy:cEnergy]
reader.dmLevel = frame
writer.dmLevel = energy
copyInputName = 0
rms = 1            ; RMS energy (standard)
log = 1            ; log RMS (dB)


;;;;; Spectral features — flux, alpha ratio, slopes, hammarberg
[spectral:cSpectral]
reader.dmLevel = fftmag
writer.dmLevel = spectral
copyInputName = 0
flux = 1
centroid = 0
maxPos = 0
minPos = 0
entropy = 0
flatness = 0
harmonicity = 0
sharpness = 0
variance = 0
skewness = 0
kurtosis = 0
alphaRatio = 1
hammarbergIndex = 1
slope = 0
; Use the same bands as eGeMAPS for slopes 0-500, 500-1500
oldSlopeScale = 0
bandEnergy = 0
normBandEnergies = 1
squareInput = 1
useLogSpectrum = 1
freqRange = 0-8000


;;;;; Mel spectrogram (for MFCC)
[melspec:cMelspec]
reader.dmLevel = fftmag
writer.dmLevel = melspec
copyInputName = 1
htkcompatible = 1
nBands = 26
usePower = 1
lofreq = 20
hifreq = 8000
specScale = mel
inverse = 0


;;;;; MFCC — Mel-frequency cepstral coefficients
[mfcc:cMfcc]
reader.dmLevel = melspec
writer.dmLevel = mfcc
copyInputName = 0
processArrayFields = 1
firstMfcc = 1
lastMfcc = 4
cepLifter = 22.0
htkcompatible = 1


;;;;; Smoother — 3-frame SMA (eGeMAPS standard)
[smootherF0:cContourSmoother]
reader.dmLevel = pitch
writer.dmLevel = smoothed_f0
nameAppend = _sma3nz
copyInputName = 1
smaWin = 3
noZeroSma = 1                    ; don't smooth zero (unvoiced) frames
noPostEOIprocessing = 1

[smootherNonF0:cContourSmoother]
reader.dmLevel = energy;spectral;mfcc
writer.dmLevel = smoothed_nonf0
nameAppend = _sma3
copyInputName = 1
smaWin = 3
noZeroSma = 0                    ; smooth everything
noPostEOIprocessing = 1


;;;;; Collector — concatenate all features
[concat:cVectorConcat]
reader.dmLevel = smoothed_f0;smoothed_nonf0;jitter;shimmer;formants
writer.dmLevel = lld
includeSingleElementFields = 1


;;;;; Output writer — writes each frame as CSV-compatible row
[writer:cCsvSink]
reader.dmLevel = lld
writer.dmLevel = output
fileName = pipe:                ; write to stdout (programmatic capture)
; fields:
; F0_sma3nz, voiceProb, HNRdB_sma3nz, jitterLocal, shimmerLocaldB,
; Loudness_sma3, alphaRatio_sma3, hammarbergIndex_sma3,
; slope0-500_sma3, slope500-1500_sma3, spectralFlux_sma3,
; mfcc1-4_sma3, F1-F3freq, F1-F3bw, F1-F3ampRelF0
delimChar = ;
append = 0
timestamp = 1
numberOfFiles = 1
